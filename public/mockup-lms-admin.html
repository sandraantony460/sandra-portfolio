<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LMS Admin Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; padding: 24px; display: flex; justify-content: center; }
  .scene { position: relative; width: 480px; }
  .toolbar { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px 14px; display: flex; gap: 8px; align-items: center; margin-bottom: 0; }
  .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: default; border: none; }
  .btn-primary { background: #2e75b6; color: white; display: flex; align-items: center; gap: 5px; }
  .btn-secondary { background: white; color: #333; border: 1px solid #ccc; }
  .caret { font-size: 9px; }
  .dropdown { background: white; border: 1px solid #d0d0d0; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); width: 220px; margin-top: 2px; overflow: hidden; position: absolute; left: 14px; top: 44px; z-index: 10; }
  .group { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .group:last-child { border-bottom: none; }
  .item { display: flex; align-items: center; gap: 10px; padding: 7px 16px; font-size: 12px; color: #333; }
  .item:hover { background: #f5f5f5; }
  .item.active { background: #eef4fb; color: #2e75b6; }
  .icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body>
<div class="scene">
  <div class="toolbar">
    <button class="btn btn-primary">Add <span class="caret">▼</span></button>
    <button class="btn btn-secondary">↕ Reorder</button>
    <button class="btn btn-secondary">Edit course</button>
    <button class="btn btn-secondary">View as Learner</button>
  </div>

  <div class="dropdown">
    <div class="group">
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="#555" stroke-width="1.2"/><line x1="4.5" y1="5.5" x2="11.5" y2="5.5" stroke="#555" stroke-width="1"/><line x1="4.5" y1="8" x2="11.5" y2="8" stroke="#555" stroke-width="1"/><line x1="4.5" y1="10.5" x2="8.5" y2="10.5" stroke="#555" stroke-width="1"/></svg></div>
        Content
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="5.5" stroke="#555" stroke-width="1.2"/><path d="M5.5 8h5M8 5.5v5" stroke="#555" stroke-width="1" stroke-linecap="round"/></svg></div>
        Web content
      </div>
    </div>
    <div class="group">
      <div class="item active">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="4,3 13,8 4,13" fill="#2e75b6"/></svg></div>
        Video
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 5h10M3 8h7" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><circle cx="11" cy="10" r="2.5" stroke="#555" stroke-width="1.2"/><path d="M10 10l1 1" stroke="#555" stroke-width="1" stroke-linecap="round"/></svg></div>
        Audio
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="3" width="12" height="10" rx="1" stroke="#555" stroke-width="1.2"/><line x1="5" y1="3" x2="5" y2="13" stroke="#555" stroke-width="1"/></svg></div>
        Presentation | Document
      </div>
    </div>
    <div class="group">
      <div class="item active">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="12" height="8" rx="1" stroke="#2e75b6" stroke-width="1.2"/><path d="M5 7h6M5 9.5h4" stroke="#2e75b6" stroke-width="1" stroke-linecap="round"/></svg></div>
        SCORM | xAPI | cmi5
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="3" width="12" height="10" rx="1" stroke="#555" stroke-width="1.2"/><path d="M6 6l-2 2 2 2M10 6l2 2-2 2" stroke="#555" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        iFrame
      </div>
    </div>
    <div class="group">
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="3" width="12" height="10" rx="1" stroke="#555" stroke-width="1.2"/><path d="M5 6.5h6M5 9h4" stroke="#555" stroke-width="1" stroke-linecap="round"/><circle cx="12" cy="9" r="1.5" stroke="#555" stroke-width="1"/></svg></div>
        Test
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="3" width="12" height="10" rx="1" stroke="#555" stroke-width="1.2"/><path d="M5 6.5h6M5 9h6M5 11.5h3" stroke="#555" stroke-width="1" stroke-linecap="round"/></svg></div>
        Survey
      </div>
      <div class="item">
        <div class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 13V6l5-3 5 3v7" stroke="#555" stroke-width="1.2" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="4" stroke="#555" stroke-width="1"/></svg></div>
        Assignment
      </div>
    </div>
  </div>
</div>
</body>
</html>
