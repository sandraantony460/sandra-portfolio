<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bug Before After</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; padding: 16px; }
  .row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .col { flex: 1; min-width: 200px; max-width: 260px; }
  .label { font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; }
  .phone { background: #1a1a1a; border-radius: 22px; padding: 10px; border: 2px solid #444; }
  .screen { background: #e0e0e0; border-radius: 10px; overflow: hidden; }
  .toolbar { background: #1565C0; padding: 7px 8px; display: flex; align-items: center; gap: 5px; }
  .app-icon { width: 18px; height: 18px; background: #90CAF9; border-radius: 3px; flex-shrink: 0; }
  .app-name { color: white; font-size: 11px; font-weight: 600; }
  .icons { margin-left: auto; display: flex; gap: 4px; }
  .icon-broken { width: 20px; height: 20px; background: rgba(144,202,249,0.2); border: 1px dashed #90CAF9; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .icon-broken svg { width: 10px; height: 10px; }
  .icon-ok { width: 20px; height: 20px; background: #1976D2; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .icon-ok svg { width: 10px; height: 10px; }
  .content { background: #f5f5f5; padding: 12px 10px; min-height: 260px; }
  .card { background: white; border-radius: 5px; padding: 9px; margin-bottom: 7px; }
  .line { height: 7px; background: #e0e0e0; border-radius: 3px; margin-bottom: 5px; }
  .line-short { width: 55%; }
  .line-long { width: 85%; }
  .line-thin { height: 5px; background: #eeeeee; border-radius: 3px; }
  .notice { margin-top: 10px; padding: 7px 8px; border-radius: 4px; font-size: 10px; line-height: 1.4; }
  .notice-error { background: #fff3e0; border-left: 3px solid #ff9800; color: #e65100; }
  .notice-ok { background: #e8f5e9; border-left: 3px solid #4caf50; color: #2e7d32; }
  .dots { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
  .dots svg { width: 12px; height: 12px; }
</style>
</head>
<body>
<div class="row">

  <div class="col">
    <p class="label">Before — icons not rendering</p>
    <div class="phone">
      <div class="screen">
        <div class="toolbar">
          <div class="app-icon"></div>
          <span class="app-name">screen</span>
          <div class="icons">
            <div class="icon-broken"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="8" height="8" rx="1" stroke="#90CAF9" stroke-width="1"/><line x1="1" y1="1" x2="9" y2="9" stroke="#90CAF9" stroke-width="1"/></svg></div>
            <div class="icon-broken"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="8" height="8" rx="1" stroke="#90CAF9" stroke-width="1"/><line x1="1" y1="1" x2="9" y2="9" stroke="#90CAF9" stroke-width="1"/></svg></div>
            <div class="icon-broken"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="8" height="8" rx="1" stroke="#90CAF9" stroke-width="1"/><line x1="1" y1="1" x2="9" y2="9" stroke="#90CAF9" stroke-width="1"/></svg></div>
            <div class="icon-broken"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="8" height="8" rx="1" stroke="#90CAF9" stroke-width="1"/><line x1="1" y1="1" x2="9" y2="9" stroke="#90CAF9" stroke-width="1"/></svg></div>
            <div class="dots"><svg viewBox="0 0 12 12" fill="#90CAF9" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="2" r="1.2"/><circle cx="6" cy="6" r="1.2"/><circle cx="6" cy="10" r="1.2"/></svg></div>
          </div>
        </div>
        <div class="content">
          <div class="card"><div class="line line-short"></div><div class="line-thin line-long"></div></div>
          <div class="card"><div class="line" style="width:40%"></div><div class="line-thin" style="width:70%"></div></div>
          <div class="notice notice-error">Runtime issue — icons not rendering on Android emulator</div>
        </div>
      </div>
    </div>
  </div>

  <div class="col">
    <p class="label">After — fixed by R&D</p>
    <div class="phone">
      <div class="screen">
        <div class="toolbar">
          <div class="app-icon"></div>
          <span class="app-name">screen</span>
          <div class="icons">
            <div class="icon-ok"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 1.5L5 8.5M2 5H8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
            <div class="icon-ok"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="4" r="2" stroke="white" stroke-width="1.2"/><path d="M2 8.5c0-1.657 1.343-2.5 3-2.5s3 .843 3 2.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg></div>
            <div class="icon-ok"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 1v2M5 7v2M1 5h2M7 5h2" stroke="white" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="5" r="2" stroke="white" stroke-width="1.2"/></svg></div>
            <div class="icon-ok"><svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="1.5" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.2"/><path d="M3.5 5h3M5 3.5v3" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg></div>
            <div class="dots"><svg viewBox="0 0 12 12" fill="#90CAF9" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="2" r="1.2"/><circle cx="6" cy="6" r="1.2"/><circle cx="6" cy="10" r="1.2"/></svg></div>
          </div>
        </div>
        <div class="content">
          <div class="card"><div class="line line-short"></div><div class="line-thin line-long"></div></div>
          <div class="card"><div class="line" style="width:40%"></div><div class="line-thin" style="width:70%"></div></div>
          <div class="notice notice-ok">Icons rendering correctly after R&D patch</div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
